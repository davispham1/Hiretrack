<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Meta - Frontend Engineer Intern - LinkedIn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f3f2ef;
            padding: 32px 16px;
            color: #000;
        }
        .container { max-width: 720px; margin: 0 auto; }

        /* Job header card */
        .job-header {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 12px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        }
        .company-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .company-logo {
            width: 56px; height: 56px;
            background: #0a66c2;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 20px;
        }
        .job-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .job-meta { color: #666; font-size: 14px; }
        .badge {
            display: inline-block;
            background: #e8f3ff;
            color: #0a66c2;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* Application card */
        .apply-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        }
        .apply-card h2 { font-size: 18px; margin-bottom: 20px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c9cdd4;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #0a66c2; box-shadow: 0 0 0 2px rgba(10,102,194,0.15); }

        .divider { border: none; border-top: 1px solid #e0e0e0; margin: 20px 0; }

        .submit-btn {
            background: #0a66c2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:hover { background: #004182; }

        .success {
            display: none;
            margin-top: 16px;
            padding: 14px;
            background: #dff0d8;
            border-radius: 6px;
            color: #2d6a2d;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="job-header">
        <div class="company-row">
            <div class="company-logo">M</div>
            <div>
                <div class="job-title" data-hiretrack-role>Frontend Engineer Intern</div>
                <div class="job-meta" data-hiretrack-company>Meta</div>
                <div class="job-meta" data-hiretrack-location>Menlo Park, CA · On-site</div>
            </div>
        </div>
        <span class="badge">Easy Apply</span>
    </div>

    <div class="apply-card">
        <h2>Submit your application</h2>

        <form id="applyForm">
            <div class="form-row">
                <div class="field">
                    <label for="first-name">First name *</label>
                    <input type="text" id="first-name" name="first-name" placeholder="First name" required />
                </div>
                <div class="field">
                    <label for="last-name">Last name *</label>
                    <input type="text" id="last-name" name="last-name" placeholder="Last name" required />
                </div>
            </div>

            <div class="field">
                <label for="email">Email address *</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>

            <div class="field">
                <label for="phone">Phone number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" />
            </div>

            <div class="field">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="City, State" />
            </div>

            <hr class="divider" />

            <div class="field">
                <label for="linkedin">LinkedIn profile URL</label>
                <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/..." />
            </div>

            <div class="field">
                <label for="website">Portfolio / Website</label>
                <input type="url" id="website" name="website" placeholder="https://..." />
            </div>

            <button class="submit-btn" type="submit" data-hiretrack-submit>Submit application</button>
        </form>

        <div id="success" class="success" data-hiretrack-success>
            Your application has been submitted to Meta!
        </div>
    </div>
</div>

<script>
    document.getElementById("applyForm").addEventListener("submit", e => {
        e.preventDefault();
        document.getElementById("success").style.display = "block";
    });
</script>
</body>
</html>
